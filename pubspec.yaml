name: ai_coder
description: "AI Coder - Mobile AI Programming IDE with SSH Remote Development"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^13.0.1
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Network & SSH
  dio: ^5.4.0
  dartssh2: ^2.8.2
  web_socket_channel: ^2.4.0
  
  # Code Editor
  flutter_code_editor: ^0.3.1
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  
  # Terminal
  xterm: ^4.0.0
  
  # Markdown & Text Rendering
  flutter_markdown: ^0.6.18
  markdown: ^7.1.1
  
  # Utilities
  path_provider: ^2.1.1
  path: ^1.8.3
  intl: ^0.18.1
  logger: ^2.0.2+1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  uuid: ^4.2.1
  crypto: ^3.0.3
  encrypt: ^5.0.1
  
  # Git Operations (via SSH commands)
  # No direct git package needed - using SSH exec
  
  # File Operations
  archive: ^3.4.9
  
  # Permission handling
  permission_handler: ^11.1.0
  
  # Biometric authentication
  local_auth: ^2.1.8
  
  # Notifications
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true
  
